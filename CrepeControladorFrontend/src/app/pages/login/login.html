<div class="login-container">
  <div class="login-card">
    <h1>Entrar</h1>

    <form (ngSubmit)="entrar()" #loginForm="ngForm">
      <label for="email">E-mail</label>
      <input
        id="email"
        name="email"
        type="email"
        [(ngModel)]="email"
        required
        autocomplete="email"
      />

      <label for="senha">Senha</label>
      <input
        id="senha"
        name="senha"
        type="password"
        [(ngModel)]="senha"
        required
        autocomplete="current-password"
      />

      <button type="submit" [disabled]="carregando || !loginForm.form.valid">
        {{ carregando ? 'Entrando...' : 'Entrar' }}
      </button>

      <div class="erro" *ngIf="erro">{{ erro }}</div>
    </form>
  </div>
</div>
